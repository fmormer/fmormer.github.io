<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name='description' content='{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}'>
  <link rel='canonical' href='{{ page.url | replace:"index.html","" | absolute_url }}'>
  <link rel='alternate' type='application/rss+xml' title='{{ site.title }}' href='{{ "/feed.xml" | relative_url }}'>

  <!-- Favicon -->
  <link rel='icon' type='image/x-icon' href='{{ "/favicon.ico" | relative_url }}'>

  <!-- Morie typography -->
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href='https://unpkg.com/ionicons@4.2.2/dist/css/ionicons.min.css' rel='stylesheet'>

  <!-- USWDS design tokens (CDN) -->
  <link rel='stylesheet' href='https://unpkg.com/@uswds/uswds@3.9.0/dist/css/uswds-global.min.css'>

  <!-- Morie styles -->
  <link rel='stylesheet' href='{{ "/assets/css/main.css" | relative_url }}'>

  <!-- Open Graph / Twitter Card -->
  {% if page.og_title %}
  <meta property="og:title" content="{{ page.og_title }}">
  <meta property="og:description" content="{{ page.og_description }}">
  <meta property="og:image" content="{{ page.og_image | absolute_url }}">
  <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  {% endif %}

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SM08DQEZ5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7SM08DQEZ5', { cookie_domain: 'morie.io' });
  </script>
</head>
