backend:
  name: github
  repo: fmormer/fmormer.github.io
  branch: master
  auth_type: implicit
  app_id: TODO_GITHUB_OAUTH_APP_CLIENT_ID
  use_graphql: true
  squash_merges: true

site_url: https://fmormer.github.io
show_preview_links: true

media_folder: img
public_folder: /img

collections:
  - name: pages
    label: Pages
    files:
      - name: portfolio
        label: Portfolio
        file: portfolio.md
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - name: capabilities
        label: Capabilities
        file: capabilities.md
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - name: methods
        label: Methods
        file: methods.md
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - name: about
        label: About
        file: about.md
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
      - name: contact
        label: Contact
        file: contact.md
        fields:
          - { label: Layout, name: layout, widget: hidden, default: default }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }

  - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{year}}/{{month}}/{{day}}/{{slug}}.html"
    preview_path_date_field: date
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text, required: false, hint: "Used for SEO meta description." }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }
